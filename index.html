<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Custom Order Spin Wheel</title>
<style>
body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(135deg, #000, #111, #fff);
    font-family: Arial, sans-serif;
    overflow: hidden;
}

canvas {
    border-radius: 50%;
    box-shadow: 0 0 40px rgba(255,255,255,0.4);
}

.controls {
    position: absolute;
    top: 20px;
    right: 20px;
}

button {
    padding: 10px 18px;
    border-radius: 30px;
    border: none;
    cursor: pointer;
    font-weight: bold;
    margin-left: 8px;
    background: linear-gradient(90deg, black, white);
    transition: 0.3s;
}

button:hover {
    transform: scale(1.08);
}

.centerControls {
    position: absolute;
    bottom: 40px;
    text-align: center;
    width: 100%;
}

.pointer {
    position: absolute;
    right: calc(50% - 240px);
    font-size: 30px;
    color: white;
}
</style>
</head>
<body>

<div class="controls">
    <button onclick="setCustomOrder()">Custom Order</button>
</div>

<canvas id="wheel" width="450" height="450"></canvas>
<div class="pointer">▶</div>

<div class="centerControls">
    <button onclick="spinRandom()">Spin Random</button>
    <button onclick="spinNext()">Spin In Order</button>
</div>

<script>
const canvas = document.getElementById("wheel");
const ctx = canvas.getContext("2d");

let names = ["Patrick", "Alex", "Jordan", "Taylor", "Chris", "Morgan"];
let colors = [];
let angle = 0;
let spinning = false;
let orderIndex = 0;

function generateColors() {
    colors = names.map(() =>
        `hsl(${Math.random()*360}, 80%, 60%)`
    );
}
generateColors();

function drawWheel() {
    const slice = (2 * Math.PI) / names.length;

    for (let i = 0; i < names.length; i++) {
        ctx.beginPath();
        ctx.moveTo(225,225);
        ctx.arc(225,225,225, angle + i*slice, angle + (i+1)*slice);
        ctx.fillStyle = colors[i];
        ctx.fill();

        ctx.save();
        ctx.translate(225,225);
        ctx.rotate(angle + i*slice + slice/2);
        ctx.textAlign = "right";
        ctx.fillStyle = "black";
        ctx.font = "bold 16px Arial";
        ctx.fillText(names[i], 200, 5);
        ctx.restore();
    }
}

function spinTo(index) {
    if (spinning) return;
    spinning = true;

    const slice = (2*Math.PI)/names.length;
    const target = (2*Math.PI*6) + (Math.PI*2 - index*slice - slice/2);
    const start = angle;
    const duration = 3500;
    const startTime = performance.now();

    function animate(t) {
        const progress = Math.min((t - startTime)/duration,1);
        const ease = 1 - Math.pow(1-progress,3);
        angle = start + (target-start)*ease;

        ctx.clearRect(0,0,450,450);
        drawWheel();

        if(progress<1){
            requestAnimationFrame(animate);
        } else {
            spinning=false;
        }
    }
    requestAnimationFrame(animate);
}

function spinRandom() {
    const rand = Math.floor(Math.random()*names.length);
    spinTo(rand);
}

function spinNext() {
    spinTo(orderIndex);
    orderIndex = (orderIndex+1)%names.length;
}

function setCustomOrder() {
    const input = prompt("Enter names in the order you want (comma separated):");
    if(!input) return;

    const newNames = input.split(",").map(n => n.trim()).filter(n=>n);
    if(newNames.length < 2) {
        alert("You need at least 2 names.");
        return;
    }

    names = newNames;
    orderIndex = 0;
    generateColors();
    ctx.clearRect(0,0,450,450);
    drawWheel();
}

drawWheel();
</script>

</body>
</html>
