<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Advanced Spin Wheel</title>
<style>
body {
    margin: 0;
    height: 100vh;
    background: linear-gradient(135deg, #000, #111, #fff);
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: Arial, sans-serif;
    overflow: hidden;
}

/* Wheel */
canvas {
    border-radius: 50%;
    box-shadow: 0 0 60px rgba(255,255,255,0.4);
}

/* Spin button */
.spinContainer {
    position: absolute;
    bottom: 40px;
    width: 100%;
    text-align: center;
}

button {
    padding: 12px 25px;
    border-radius: 30px;
    border: none;
    font-weight: bold;
    cursor: pointer;
    background: linear-gradient(90deg, black, white);
    transition: 0.3s;
}

button:hover {
    transform: scale(1.1);
}

/* Pointer */
.pointer {
    position: absolute;
    right: calc(50% - 260px);
    font-size: 34px;
    color: white;
}

/* Editor box */
.editorBox {
    position: absolute;
    top: 20px;
    left: 20px;
    width: 260px;
    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(8px);
    padding: 15px;
    border-radius: 20px;
    box-shadow: 0 0 25px rgba(255,255,255,0.2);
}

textarea {
    width: 100%;
    min-height: 60px;
    resize: none;
    border: none;
    border-radius: 15px;
    padding: 10px;
    font-size: 14px;
    outline: none;
    background: rgba(255,255,255,0.9);
}
</style>
</head>
<body>

<div class="editorBox">
    <strong>Edit Names (comma separated):</strong><br><br>
    <textarea id="nameInput">Patrick, Alex, Jordan, Taylor, Chris, Morgan</textarea>
</div>

<canvas id="wheel" width="520" height="520"></canvas>
<div class="pointer">▶</div>

<div class="spinContainer">
    <button onclick="spinWheel()">SPIN</button>
</div>

<script>
const canvas = document.getElementById("wheel");
const ctx = canvas.getContext("2d");
const textarea = document.getElementById("nameInput");

let names = [];
let colors = [];
let angle = 0;
let spinning = false;
let orderIndex = 0;

/* Auto-expand textarea */
textarea.addEventListener("input", function() {
    this.style.height = "auto";
    this.style.height = this.scrollHeight + "px";
    updateNames();
});

function updateNames() {
    const input = textarea.value;
    const newNames = input.split(",")
        .map(n => n.trim())
        .filter(n => n.length > 0);

    if (newNames.length >= 2) {
        names = newNames;
        orderIndex = 0;
        generateColors();
        draw();
    }
}

function generateColors() {
    colors = names.map(() =>
        `hsl(${Math.random()*360}, 80%, 60%)`
    );
}

function draw() {
    ctx.clearRect(0,0,520,520);
    const slice = (2*Math.PI)/names.length;

    for (let i=0;i<names.length;i++) {
        ctx.beginPath();
        ctx.moveTo(260,260);
        ctx.arc(260,260,260, angle + i*slice, angle + (i+1)*slice);
        ctx.fillStyle = colors[i];
        ctx.fill();

        ctx.save();
        ctx.translate(260,260);
        ctx.rotate(angle + i*slice + slice/2);
        ctx.textAlign="right";
        ctx.fillStyle="black";
        ctx.font="bold 18px Arial";
        ctx.fillText(names[i], 230, 8);
        ctx.restore();
    }
}

function spinWheel() {
    if (spinning || names.length < 2) return;
    spinning = true;

    const slice = (2*Math.PI)/names.length;
    const targetIndex = orderIndex;
    orderIndex = (orderIndex+1)%names.length;

    const finalAngle =
        (2*Math.PI*8) +
        (Math.PI*2 - targetIndex*slice - slice/2);

    const startAngle = angle;
    const duration = 4000;
    const startTime = performance.now();

    function animate(time) {
        const progress = (time-startTime)/duration;
        const eased = 1 - Math.pow(1-progress,4);

        if(progress<1) {
            angle = startAngle + (finalAngle-startAngle)*eased;
            draw();
            requestAnimationFrame(animate);
        } else {
            angle = finalAngle % (2*Math.PI);
            draw();
            spinning=false;
        }
    }

    requestAnimationFrame(animate);
}

/* Init */
updateNames();
</script>

</body>
</html>
