<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Ordered Spin Wheel</title>
<style>
body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(135deg, #000, #111, #fff);
    font-family: Arial, sans-serif;
    overflow: hidden;
}

canvas {
    border-radius: 50%;
    box-shadow: 0 0 60px rgba(255,255,255,0.4);
}

.topRight {
    position: absolute;
    top: 20px;
    right: 20px;
}

button {
    padding: 10px 20px;
    border-radius: 30px;
    border: none;
    font-weight: bold;
    cursor: pointer;
    background: linear-gradient(90deg, black, white);
    transition: 0.3s;
}

button:hover {
    transform: scale(1.08);
}

.bottomCenter {
    position: absolute;
    bottom: 40px;
    text-align: center;
    width: 100%;
}

.pointer {
    position: absolute;
    right: calc(50% - 250px);
    font-size: 32px;
    color: white;
}

/* Simple message box */
.customMessage {
    position: absolute;
    top: 20px;
    left: 20px;
    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(6px);
    padding: 15px 20px;
    border-radius: 20px;
    color: white;
    font-weight: bold;
    box-shadow: 0 0 20px rgba(255,255,255,0.2);
}
</style>
</head>
<body>

<!-- EDIT THIS TEXT IN THE CODE -->
<div class="customMessage">
    Your message here
</div>

<canvas id="wheel" width="500" height="500"></canvas>
<div class="pointer">▶</div>

<div class="bottomCenter">
    <button onclick="spinWheel()">SPIN</button>
</div>

<script>
const canvas = document.getElementById("wheel");
const ctx = canvas.getContext("2d");

let names = ["Patrick", "Alex", "Jordan", "Taylor", "Chris", "Morgan"];
let colors = [];
let angle = 0;
let spinning = false;
let orderIndex = 0;

function generateColors() {
    colors = names.map(() =>
        `hsl(${Math.random()*360}, 80%, 60%)`
    );
}
generateColors();

function drawWheel() {
    const slice = (2 * Math.PI) / names.length;

    for (let i = 0; i < names.length; i++) {
        ctx.beginPath();
        ctx.moveTo(250,250);
        ctx.arc(250,250,250, angle + i*slice, angle + (i+1)*slice);
        ctx.fillStyle = colors[i];
        ctx.fill();

        ctx.save();
        ctx.translate(250,250);
        ctx.rotate(angle + i*slice + slice/2);
        ctx.textAlign = "right";
        ctx.fillStyle = "black";
        ctx.font = "bold 18px Arial";
        ctx.fillText(names[i], 220, 8);
        ctx.restore();
    }
}

function spinWheel() {
    if (spinning) return;
    spinning = true;

    const slice = (2*Math.PI)/names.length;
    const targetIndex = orderIndex;
    orderIndex = (orderIndex+1)%names.length;

    const finalAngle =
        (2*Math.PI*8) +
        (Math.PI*2 - targetIndex*slice - slice/2);

    const startAngle = angle;
    const duration = 4000;
    const startTime = performance.now();

    function animate(time) {
        const progress = (time-startTime)/duration;
        const eased = 1 - Math.pow(1-progress,4);

        if (progress < 1) {
            angle = startAngle + (finalAngle-startAngle) * eased;
            ctx.clearRect(0,0,500,500);
            drawWheel();
            requestAnimationFrame(animate);
        } else {
            angle = finalAngle % (2*Math.PI);
            ctx.clearRect(0,0,500,500);
            drawWheel();
            spinning = false;
        }
    }

    requestAnimationFrame(animate);
}

drawWheel();
</script>

</body>
</html>
