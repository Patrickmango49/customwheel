<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Ordered Spin Wheel</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(135deg, #000, #111, #fff);
    font-family: Arial, sans-serif;
    overflow: hidden;
}

canvas {
    border-radius: 50%;
    box-shadow: 0 0 60px rgba(255,255,255,0.4);
}

.topRight {
    position: absolute;
    top: 20px;
    right: 20px;
}

button {
    padding: 10px 20px;
    border-radius: 30px;
    border: none;
    font-weight: bold;
    cursor: pointer;
    background: linear-gradient(90deg, black, white);
    transition: 0.3s;
}

button:hover {
    transform: scale(1.08);
}

.bottomCenter {
    position: absolute;
    bottom: 40px;
    text-align: center;
    width: 100%;
}

.pointer {
    position: absolute;
    right: calc(50% - 250px);
    font-size: 32px;
    color: white;
}

/* Custom Message */
.customMessage {
    position: absolute;
    top: 25px;
    left: 25px;
    max-width: 360px;
    padding: 20px 24px;
    border-radius: 18px;

    background: rgba(255, 255, 255, 0.08);
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);

    border: 1px solid rgba(255, 255, 255, 0.18);
    box-shadow: 
        0 12px 35px rgba(0, 0, 0, 0.45),
        0 0 25px rgba(255, 255, 255, 0.08);

    color: white;
    font-family: 'Inter', sans-serif;
    font-weight: 400;
    font-size: 15px;
    line-height: 1.65;
    letter-spacing: 0.2px;
    white-space: pre-line;

    transition: all 0.8s ease;
}

/* Hidden state after 2 spins */
.customMessage.hide {
    opacity: 0;
    filter: blur(12px);
    transform: translateY(-10px);
}
</style>
</head>
<body>

<div class="customMessage" id="customMessage">Welcome to the Wheel Of Fortune, and hello Mrs. Venditti,
this Spin Wheel has been made by one of your old students, hope you remember me,
and hope you enjoy my site!

Sherly's Older Brother:
- Patrick Molina
</div>

<div class="topRight">
    <button onclick="setCustomOrder()">‎ </button>
</div>

<canvas id="wheel" width="500" height="500"></canvas>
<div class="pointer">▶</div>

<div class="bottomCenter">
    <button onclick="spinWheel()">SPIN</button>
</div>

<script>
const canvas = document.getElementById("wheel");
const ctx = canvas.getContext("2d");
const messageBox = document.getElementById("customMessage");

let rawOrder = ["Patrick", "Alex", "Sherly", "Taylor", "Chris", "Venditti"];
let uniqueNames = [];
let nameToIndex = {};
let colors = [];

let angle = 0;
let spinning = false;
let orderIndex = 0;
let spinCount = 0;

/* Remove duplicates for wheel display */
function rebuildWheel() {
    uniqueNames = [];
    nameToIndex = {};

    rawOrder.forEach(name => {
        if (!(name in nameToIndex)) {
            nameToIndex[name] = uniqueNames.length;
            uniqueNames.push(name);
        }
    });

    generateColors();
}

function generateColors() {
    colors = uniqueNames.map(() =>
        `hsl(${Math.random()*360}, 80%, 60%)`
    );
}

function drawWheel() {
    ctx.clearRect(0,0,500,500);
    const slice = (2 * Math.PI) / uniqueNames.length;

    for (let i = 0; i < uniqueNames.length; i++) {
        ctx.beginPath();
        ctx.moveTo(250,250);
        ctx.arc(250,250,250, angle + i*slice, angle + (i+1)*slice);
        ctx.fillStyle = colors[i];
        ctx.fill();

        ctx.save();
        ctx.translate(250,250);
        ctx.rotate(angle + i*slice + slice/2);
        ctx.textAlign = "right";
        ctx.fillStyle = "black";
        ctx.font = "bold 18px Arial";
        ctx.fillText(uniqueNames[i], 220, 8);
        ctx.restore();
    }
}

function spinWheel() {
    if (spinning || rawOrder.length < 2) return;
    spinning = true;

    const currentName = rawOrder[orderIndex];
    const targetIndex = nameToIndex[currentName];

    orderIndex = (orderIndex+1)%rawOrder.length;

    const slice = (2*Math.PI)/uniqueNames.length;

    const finalAngle =
        (2*Math.PI*8) +
        (Math.PI*2 - targetIndex*slice - slice/2);

    const startAngle = angle;
    const duration = 4000;
    const startTime = performance.now();

    function animate(time) {
        const progress = (time-startTime)/duration;
        const eased = 1 - Math.pow(1-progress,4);

        if (progress < 1) {
            angle = startAngle + (finalAngle-startAngle) * eased;
            drawWheel();
            requestAnimationFrame(animate);
        } else {
            angle = finalAngle % (2*Math.PI);
            drawWheel();
            spinning = false;

            spinCount++;
            if (spinCount === 2) {
                messageBox.classList.add("hide");
                setTimeout(() => {
                    messageBox.style.display = "none";
                }, 800);
            }
        }
    }

    requestAnimationFrame(animate);
}

function setCustomOrder() {
    const input = prompt("Enter names or numbers in order (comma separated):");
    if(!input) return;

    const newList = input.split(",")
        .map(n => n.trim())
        .filter(n => n.length > 0);

    if(newList.length < 2) {
        alert("Need at least 2 values.");
        return;
    }

    rawOrder = newList;
    orderIndex = 0;
    angle = 0;
    spinCount = 0;
    messageBox.style.display = "block";
    messageBox.classList.remove("hide");

    rebuildWheel();
    drawWheel();
}

rebuildWheel();
drawWheel();
</script>

</body>
</html>
